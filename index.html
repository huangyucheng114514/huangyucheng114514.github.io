<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYC的网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        /* 主要内容区 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
        }

        /* 英雄区域 */
        .hero {
            text-align: center;
            padding: 4rem 0;
            color: white;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* 卡片区域 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .card h3 {
            margin-bottom: 0.5rem;
            color: #667eea;
        }

        .card p {
            color: #666;
        }

        /* 页脚 */
        footer {
            text-align: center;
            color: white;
            padding: 2rem;
            margin-top: 4rem;
            opacity: 0.8;
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 0.8rem;
                padding: 0.8rem 1rem;
            }

            .logo {
                font-size: 1.3rem;
            }
            
            .nav-links {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
                font-size: 0.9rem;
            }

            .container {
                padding: 5rem 1rem 1rem;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .card {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.6rem;
            }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.9rem;
            }

            .nav-links {
                gap: 0.8rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">🚀 HYC</div>
        <ul class="nav-links">
            <li><a href="/">首页</a></li>
            <li><a href="/hyc">关于</a></li>
            <li><a href="/help">服务</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>

    <!-- 主要内容 -->
    <div class="container">
        <!-- 英雄区域 -->
        <section class="hero" id="home">
            <h1>欢迎来到 HYC 的网页</h1>
            <p>这是一个现代化、响应式的网页设计</p>
            <a href="#features" class="btn">了解更多</a>
        </section>

        <!-- 特色卡片 -->
        <section class="features" id="features">
            <div class="card">
                <div class="card-icon">🎨</div>
                <h3>精美设计</h3>
                <p>采用现代设计风格，渐变背景与柔和阴影，视觉效果出众。</p>
            </div>

            <div class="card">
                <div class="card-icon">📱</div>
                <h3>手机适配</h3>
                <p>完美适配电脑、平板、手机，随时随地流畅浏览。</p>
            </div>

            <div class="card">
                <div class="card-icon">⚡</div>
                <h3>快速加载</h3>
                <p>纯HTML/CSS构建，无需复杂框架，加载速度极快。</p>
            </div>
        </section>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>&copy; 2024 HYC. All rights reserved.</p>
    </footer>
</body>
</html>
